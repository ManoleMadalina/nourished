<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nourishED — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --g1:#16a34a;
    --g2:#10b981;
    --g3:#0d9488;
    --soft:#ecfdf5;
    --soft2:#f0fdfa;
    --ink:#0f172a;
    --muted:#64748b;
    --border:#e2e8f0;
    --amber:#f59e0b;
    --amber-soft:#fffbeb;
    --green-soft:#f0fdf4;
    --blue:#3b82f6;
    --blue-soft:#eff6ff;
    --purple:#8b5cf6;
    --purple-soft:#f5f3ff;
    --radius:16px;
    --shadow:0 1px 2px rgba(15,23,42,.04), 0 10px 28px rgba(15,23,42,.07);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--ink);
    background:#f6faf9;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.brand{font-family:'Poppins',system-ui,sans-serif;}
  button{font-family:inherit;}
  :focus-visible{outline:2px solid var(--g2); outline-offset:2px; border-radius:6px;}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }

  .grad-text{
    background-image:linear-gradient(120deg,var(--g1),var(--g2),var(--g3));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .grad-bg{ background-image:linear-gradient(120deg,var(--g1),var(--g2),var(--g3)); }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:.4rem;
    border-radius:12px; padding:.65rem 1.1rem; font-weight:600; font-size:.92rem;
    cursor:pointer; border:1px solid transparent; transition:transform .12s ease, filter .12s ease, background .12s ease;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{ background-image:linear-gradient(120deg,var(--g1),var(--g2)); color:#fff; box-shadow:var(--shadow);}
  .btn-primary:hover{filter:brightness(1.06); transform:translateY(-1px);}
  .btn-ghost{ background:#fff; border:1px solid var(--border); color:var(--ink); }
  .btn-ghost:hover{ background:#f8fafc; }
  .btn-sm{padding:.4rem .8rem; font-size:.82rem; border-radius:9px;}
  .btn-block{width:100%;}

  .card{ background:#fff; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:1.4rem 1.6rem; }
  .pill{ display:inline-flex; align-items:center; gap:.3rem; font-size:.72rem; font-weight:700; padding:.25rem .6rem; border-radius:999px; letter-spacing:.02em; text-transform:uppercase;}
  .pill-preview{ background:var(--amber-soft); color:#92400e; border:1px solid #fde68a; }

  /* ---------- Logo mark ---------- */
  .logo-row{ display:flex; align-items:center; gap:.55rem; }
  .logo-icon{ flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; border-radius:9px; background-image:linear-gradient(135deg,var(--g1),var(--g3)); box-shadow:var(--shadow); }
  .logo-text-compact{ font-weight:700; color:#1e293b; font-size:1.15rem; }

  /* ---------- Login / role select ---------- */
  #login-screen{
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:3rem 1.25rem 4rem;
    background:radial-gradient(circle at 20% 0%, #f0fdfa 0%, #f6faf9 45%, #f6faf9 100%);
  }
  .login-back{ align-self:flex-start; margin-left:.5rem; color:var(--muted); font-size:.85rem; text-decoration:none; display:flex; align-items:center; gap:.3rem; background:none; border:none; cursor:pointer; padding:0;}
  .login-logo{ font-size:2.6rem; font-weight:700; margin:.3rem 0 .3rem; }
  .login-sub1{ color:#334155; font-size:1.05rem; margin:0; }
  .login-sub2{ color:var(--muted); font-size:.9rem; margin:.2rem 0 1.2rem; }
  .role-panel{ width:100%; max-width:880px; background:#fff; border-radius:24px; border:1px solid var(--border); box-shadow:var(--shadow); padding:2rem; }
  .role-panel h2{ margin:0 0 .15rem; font-size:1.15rem;}
  .role-panel p.lede{ margin:0 0 1.4rem; color:var(--muted); font-size:.88rem;}
  .role-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; }
  @media (max-width:720px){ .role-grid{grid-template-columns:1fr 1fr;} }
  @media (max-width:480px){ .role-grid{grid-template-columns:1fr;} }
  .role-card{ border:1px solid var(--border); border-radius:14px; padding:1.4rem 1rem 1.2rem; text-align:center; background:#fff; display:flex; flex-direction:column; align-items:center; }
  .role-icon{ width:60px; height:60px; border-radius:16px; background-image:linear-gradient(135deg,var(--g1),var(--g3)); color:#fff; display:flex; align-items:center; justify-content:center; margin-bottom:.85rem; box-shadow:var(--shadow);}
  .role-icon svg{ width:30px; height:30px;}
  .role-name{ font-weight:700; font-size:1.02rem; margin:0;}
  .role-label{ color:var(--muted); font-size:.82rem; margin:.15rem 0 .9rem; min-height:1rem;}

  /* ---------- Curriculum Overview (public page) ---------- */
  #curriculum-screen{ min-height:100vh; background:#f6faf9; }
  .cur-header{ background:#fff; border-bottom:1px solid var(--border); padding:1rem 1.6rem; display:flex; align-items:center; justify-content:space-between;}
  .cur-hero{ background-image:linear-gradient(115deg,#0f766e,#1d4ed8); color:#fff; padding:3rem 1.5rem; text-align:center;}
  .cur-hero h1{ font-size:2.1rem; margin:0 0 .7rem;}
  .cur-hero p{ max-width:680px; margin:0 auto; opacity:.92; font-size:.98rem; line-height:1.5;}
  .cur-body{ max-width:1080px; margin:0 auto; padding:1.6rem 1.4rem 3rem;}
  .band-tabs{ display:flex; background:#eef2f1; border-radius:999px; padding:.3rem; margin-bottom:1.4rem; overflow-x:auto;}
  .band-tab{ flex:1; white-space:nowrap; border:none; background:transparent; padding:.65rem 1rem; border-radius:999px; font-weight:600; font-size:.85rem; color:var(--muted); cursor:pointer;}
  .band-tab.active{ background:#fff; color:var(--ink); box-shadow:0 1px 3px rgba(15,23,42,.12);}
  .band-badge{ display:inline-block; background:#fee2e2; color:#b91c1c; font-size:.7rem; font-weight:700; padding:.25rem .6rem; border-radius:999px; margin-bottom:.6rem; text-transform:uppercase; letter-spacing:.02em;}
  .cur-lesson-card{ border:1px solid var(--border); border-radius:14px; padding:1.1rem 1.3rem; background:#fff; margin-bottom:.9rem;}
  .cur-lesson-meta{ display:flex; justify-content:space-between; color:var(--muted); font-size:.78rem; margin-bottom:.4rem;}
  .cur-module-tag{ display:inline-flex; align-items:center; gap:.3rem; background:var(--soft); color:var(--g3); font-size:.76rem; font-weight:600; padding:.25rem .6rem; border-radius:8px; margin-top:.6rem;}

  /* ---------- App shell ---------- */
  #topbar{ background:#fff; border-bottom:1px solid var(--border); padding:.9rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:5;}
  .topbar-left{ display:flex; align-items:center; gap:.6rem; font-size:1.15rem; }
  .topbar-left .brand{ font-weight:700; }
  .topbar-left .sep{ color:var(--border); }
  .topbar-left .who{ color:var(--muted); font-size:.92rem; font-weight:500;}
  #content{ max-width:1080px; margin:0 auto; padding:1.6rem 1.4rem 3rem; }

  .stat-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:1.2rem;}
  @media (max-width:760px){ .stat-grid{grid-template-columns:1fr 1fr;} }
  .stat-card{ background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:1.1rem 1.2rem; box-shadow:var(--shadow); position:relative; overflow:hidden;}
  .stat-card .lbl{ color:var(--muted); font-size:.78rem; font-weight:600; text-transform:uppercase; letter-spacing:.03em;}
  .stat-card .val{ font-size:1.7rem; font-weight:700; margin-top:.25rem;}

  .section-title{ display:flex; align-items:center; gap:.5rem; font-size:1.05rem; font-weight:700; margin:0 0 .2rem;}
  .section-sub{ color:var(--muted); font-size:.85rem; margin:0 0 1rem;}

  .tabs{ display:inline-flex; background:#eef2f1; border-radius:999px; padding:.25rem; gap:.2rem; margin-bottom:1.2rem; flex-wrap:wrap;}
  .tab-btn{ border:none; background:transparent; padding:.5rem 1rem; border-radius:999px; font-weight:600; font-size:.86rem; color:var(--muted); cursor:pointer;}
  .tab-btn.active{ background:#fff; color:var(--ink); box-shadow:0 1px 3px rgba(15,23,42,.12);}

  .progress-track{ height:10px; background:#e5eae8; border-radius:999px; overflow:hidden;}
  .progress-fill{ height:100%; background-image:linear-gradient(120deg,var(--g1),var(--g2)); border-radius:999px; transition:width .4s ease;}
  .progress-row{ display:flex; justify-content:space-between; font-size:.85rem; font-weight:600; margin-bottom:.4rem;}

  /* games hub */
  .game-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:.9rem;}
  @media (max-width:760px){ .game-grid{grid-template-columns:1fr 1fr;} }
  .game-tile{ border:1px solid var(--border); border-radius:14px; background:#fff; padding:1.1rem .8rem; text-align:center; cursor:pointer; transition:transform .12s ease, box-shadow .12s ease;}
  .game-tile:hover{ transform:translateY(-2px); box-shadow:var(--shadow);}
  .game-tile .emoji{ font-size:1.8rem;}
  .game-tile .gname{ font-weight:700; font-size:.92rem; margin-top:.3rem;}
  .game-tile .gdesc{ color:var(--muted); font-size:.76rem; margin-top:.15rem;}

  .tray{ display:flex; flex-wrap:wrap; gap:.6rem; padding:1rem; border:1px dashed var(--border); border-radius:14px; background:#fafdfc; min-height:64px;}
  .chip{ border:1px solid var(--border); background:#fff; border-radius:12px; padding:.5rem .8rem; font-weight:600; font-size:.85rem; cursor:grab; display:flex; align-items:center; gap:.4rem; user-select:none;}
  .chip.selected{ border-color:var(--g2); box-shadow:0 0 0 3px var(--soft);}
  .chip.placed{ opacity:.45; cursor:default;}
  .zones{ display:grid; grid-template-columns:repeat(5,1fr); gap:.7rem; margin-top:1rem;}
  @media (max-width:760px){ .zones{grid-template-columns:1fr 1fr;} }
  .zone{ border:2px dashed #cbd5e1; border-radius:14px; min-height:130px; padding:.7rem; background:#fff; text-align:center;}
  .zone h4{ margin:.1rem 0 .6rem; color:var(--g3); font-size:.85rem;}
  .zone.wrong{ animation:shake .35s; border-color:var(--red,#ef4444); background:#fef2f2;}
  @keyframes shake{ 10%,90%{transform:translateX(-2px);} 20%,80%{transform:translateX(3px);} 30%,50%,70%{transform:translateX(-5px);} 40%,60%{transform:translateX(5px);} }
  .zone-item{ font-size:.8rem; background:var(--green-soft); border-radius:8px; padding:.25rem .4rem; margin-bottom:.3rem;}

  .quiz-box{ border:1px solid var(--border); border-radius:14px; padding:1.4rem; background:#fff;}
  .opt{ display:block; width:100%; text-align:left; padding:.85rem 1rem; border:1px solid var(--border); border-radius:12px; margin-bottom:.6rem; background:#fff; font-weight:600; cursor:pointer; font-size:.92rem;}
  .opt.correct{ background:var(--green-soft); border-color:var(--g2);}
  .opt.incorrect{ background:#fef2f2; border-color:#fca5a5;}
  .feedback{ border-radius:12px; padding:.9rem 1rem; margin-top:.6rem; font-size:.88rem;}
  .feedback.ok{ background:var(--green-soft); color:#166534;}
  .feedback.bad{ background:#fef2f2; color:#991b1b;}

  .plate-zone{ border:2px dashed #cbd5e1; border-radius:18px; min-height:120px; padding:1rem; display:flex; flex-wrap:wrap; gap:.5rem; align-items:center; justify-content:center; color:var(--muted); font-size:.88rem; background:#fff;}
  .goal-row{ display:flex; gap:.5rem; flex-wrap:wrap; margin:1rem 0;}
  .goal-chip{ background:var(--soft); border-radius:999px; padding:.35rem .8rem; font-size:.8rem; font-weight:700; color:var(--g3); }
  .goal-chip.done{ background-image:linear-gradient(120deg,var(--g1),var(--g2)); color:#fff;}
  .food-pick-grid{ display:grid; grid-template-columns:repeat(6,1fr); gap:.6rem; margin-top:1rem;}
  @media (max-width:760px){ .food-pick-grid{grid-template-columns:repeat(3,1fr);} }
  .food-pick{ border:1px solid var(--border); border-radius:12px; background:#fff; padding:.7rem .4rem; text-align:center; cursor:pointer; font-size:.82rem; font-weight:600;}
  .food-pick small{ display:block; color:var(--muted); font-weight:500; font-size:.7rem; margin-top:.15rem;}
  .food-pick:hover{ background:#fafdfc;}

  .sm-cols{ display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top:1rem;}
  .sm-card{ border:1px solid var(--border); border-radius:12px; padding:.8rem 1rem; background:#fff; font-weight:600; font-size:.88rem; cursor:pointer; margin-bottom:.6rem; text-align:left;}
  .sm-card.selected{ border-color:var(--g2); box-shadow:0 0 0 3px var(--soft);}
  .sm-card.matched{ background:var(--green-soft); border-color:var(--g2); opacity:.6; cursor:default;}
  .sm-card.wrong{ background:#fef2f2; border-color:#fca5a5;}

  .alert-box{ border-radius:12px; padding:.85rem 1rem; margin-bottom:.7rem; font-size:.86rem; display:flex; gap:.6rem;}
  .alert-warn{ background:var(--amber-soft); color:#92400e;}
  .alert-good{ background:var(--green-soft); color:#166534;}

  table.tbl{ width:100%; border-collapse:collapse; font-size:.88rem;}
  table.tbl th{ text-align:left; color:var(--muted); font-weight:600; font-size:.76rem; text-transform:uppercase; letter-spacing:.03em; padding:.5rem .6rem; border-bottom:1px solid var(--border);}
  table.tbl td{ padding:.7rem .6rem; border-bottom:1px solid #f1f5f4;}
  .status-pill{ font-size:.74rem; font-weight:700; padding:.2rem .6rem; border-radius:999px;}
  .status-ok{ background:var(--green-soft); color:#166534;}
  .status-needs{ background:var(--amber-soft); color:#92400e;}
  .detail-row td{ background:#fafdfc; font-size:.82rem; color:#334155;}

  .lesson-row{ margin-bottom:1rem;}
  .lesson-row .top{ display:flex; justify-content:space-between; font-size:.9rem; margin-bottom:.3rem;}
  .lesson-row .meta{ color:var(--muted); font-size:.78rem;}

  .insight{ border-radius:14px; padding:1rem 1.1rem; margin-bottom:.8rem; border-left:5px solid;}
  .insight h4{ margin:0 0 .3rem; font-size:.92rem;}
  .insight p{ margin:0; font-size:.85rem; color:#334155;}
  .insight.focus{ background:var(--blue-soft); border-color:var(--blue);}
  .insight.success{ background:var(--green-soft); border-color:var(--g2);}
  .insight.tip{ background:var(--purple-soft); border-color:var(--purple);}
  .insight.alertc{ background:var(--amber-soft); border-color:var(--amber);}

  .daily-card{ border:1px solid var(--border); border-radius:14px; padding:1.1rem 1.2rem; margin-bottom:1rem; background:#fff;}
  .daily-card.learning{ border-color:var(--blue);}
  .daily-card.done{ border-color:var(--g2);}
  .badge{ font-size:.7rem; font-weight:700; padding:.2rem .55rem; border-radius:999px; margin-right:.4rem;}
  .badge-blue{ background:var(--blue-soft); color:#1d4ed8;}
  .badge-green{ background:var(--green-soft); color:#166534;}
  .badge-gray{ background:#f1f5f4; color:var(--muted);}
  .takeaway-box{ background:#f8fafc; border-radius:10px; padding:.7rem .9rem; margin:.6rem 0; font-size:.85rem;}
  .takeaway-box ul{ margin:.3rem 0 0; padding-left:1.1rem;}

  .mastery-row{ margin-bottom:.9rem;}
  .mastery-row .top{ display:flex; justify-content:space-between; font-size:.86rem; font-weight:600; margin-bottom:.3rem;}
  .mastery-note{ font-size:.76rem; color:var(--amber); margin-top:.2rem;}

  .bars{ display:flex; align-items:flex-end; gap:.8rem; height:140px; margin:1rem 0;}
  .bar-group{ flex:1; display:flex; flex-direction:column; align-items:center; gap:.25rem; height:100%; justify-content:flex-end;}
  .bar-pair{ display:flex; gap:3px; align-items:flex-end; height:100%;}
  .bar{ width:14px; border-radius:4px 4px 0 0;}
  .bar.min{ background:var(--g2);}
  .bar.score{ background:var(--blue);}
  .bar-day{ font-size:.72rem; color:var(--muted); margin-top:.3rem;}

  .achievement{ display:flex; gap:.7rem; align-items:flex-start; border-radius:12px; padding:.8rem 1rem; margin-bottom:.6rem;}
  .empty-state{ text-align:center; color:var(--muted); padding:2.5rem 1rem; font-size:.9rem;}

  .legend{ display:flex; gap:1rem; font-size:.78rem; color:var(--muted); margin-top:.4rem;}
  .legend span{ display:inline-flex; align-items:center; gap:.3rem;}
  .dot{ width:8px; height:8px; border-radius:50%; display:inline-block;}

  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:1rem;}
  @media (max-width:760px){ .grid2{grid-template-columns:1fr;} }

  .center-msg{ text-align:center; padding:2.5rem 1rem;}
  .big-emoji{ font-size:2.6rem;}

  /* ---------- Home / landing ---------- */
  #home-screen{ min-height:100vh; background:#f6faf9; }
  .home-nav{ background:#fff; border-bottom:1px solid var(--border); padding:1rem 2rem; display:flex; align-items:center; justify-content:space-between; }
  .home-nav .brand{ font-weight:700; font-size:1.2rem; }
  .home-hero{ position:relative; text-align:center; padding:4.5rem 1.5rem 4rem; background:radial-gradient(circle at 50% -10%, #d7f5ec 0%, #eafaf4 38%, #f6faf9 72%); }
  .hero-badge{ display:inline-flex; align-items:center; gap:.4rem; background:#fff; border:1px solid var(--border); color:var(--g3); font-weight:600; font-size:.82rem; padding:.45rem .9rem; border-radius:999px; box-shadow:0 1px 2px rgba(15,23,42,.05); }
  .home-hero h1{ font-size:clamp(2.4rem,6vw,4rem); line-height:1.18; padding-bottom:.08em; margin:1.4rem auto .9rem; max-width:16ch; font-weight:700; }
  .home-hero .hero-lede{ max-width:640px; margin:0 auto; color:#475569; font-size:1.08rem; line-height:1.55; }
  .hero-cta{ display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin-top:2rem; }
  .hero-cta .btn{ padding:.85rem 1.6rem; font-size:1rem; border-radius:13px; }
  .feature-grid{ max-width:1080px; margin:0 auto; padding:0 1.4rem 4rem; display:grid; grid-template-columns:repeat(3,1fr); gap:1.4rem; margin-top:-1.5rem; }
  @media (max-width:820px){ .feature-grid{ grid-template-columns:1fr; } }
  .feature-card{ background:#fff; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:1.6rem 1.6rem 1.7rem; }
  .feature-ico{ width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; color:#fff; margin-bottom:1rem; }
  .feature-card h3{ margin:0 0 .45rem; font-size:1.15rem; color:var(--g1); }
  .feature-card p{ margin:0; color:#475569; font-size:.92rem; line-height:1.5; }
</style>
</head>

  {id:'broccoli', name:'Broccoli', emoji:'🥦', group:'vegetables'},

/* --- Food Sorting --- */
function renderFoodSorting(){
  const fs = S.fs;
  const tray = fs.remaining.map(id=>{
    const item = FOOD_SORT_ITEMS.find(i=>i.id===id);
    return `<div class="chip ${fs.selected===id?'selected':''}" draggable="true"
      ondragstart="fsDragStart(event,'${id}')" onclick="fsSelect('${id}')">${item.emoji} ${item.name}</div>`;
  }).join('') || '<span style="color:var(--muted); font-size:.85rem;">All foods sorted!</span>';

  const zones = GROUPS.map(g=>{
    const placedItems = (fs.placed[g]||[]).map(id=>{
      const item = FOOD_SORT_ITEMS.find(i=>i.id===id);
      return `<div class="zone-item">${item.emoji} ${item.name}</div>`;
    }).join('');
    return `<div class="zone ${fs.wrongZone===g?'wrong':''}" ondragover="event.preventDefault()" ondrop="fsDrop(event,'${g}')" onclick="fsPlace('${g}')">
      <h4>${g}</h4>${placedItems}
    </div>`;
  }).join('');

  const done = fs.remaining.length===0;
  return `
    <p class="section-sub">Drag each food into its correct food group category</p>
    <div style="text-align:right; font-weight:700; color:var(--g3); margin-bottom:.4rem;">Score: ${fs.score}</div>
    <p style="font-weight:600; font-size:.88rem; margin-bottom:.4rem;">Drag these foods to the correct group:</p>
    <div class="tray">${tray}</div>
    <div class="zones">${zones}</div>
    ${done ? `<div class="center-msg"><div class="big-emoji">🎉</div><p style="font-weight:700;">All foods sorted! Score: ${fs.score}/10</p>
      <button class="btn btn-primary btn-sm" onclick="S.fs=null; openGame('fs')">Play Again</button></div>` :
      `<p style="font-size:.78rem; color:var(--muted); margin-top:.8rem;">💡 Tip: drag, or tap a food then tap the category it belongs to.</p>`}
  `;
}
function fsDragStart(e,id){ e.dataTransfer.setData('text/plain', id); }
function fsSelect(id){ S.fs.selected = (S.fs.selected===id) ? null : id; render(); }
function fsDrop(e,group){ const id = e.dataTransfer.getData('text/plain'); fsTryPlace(id, group); }
function fsPlace(group){ if(S.fs.selected) fsTryPlace(S.fs.selected, group); }
function fsTryPlace(id, group){
  const fs = S.fs;
  const item = FOOD_SORT_ITEMS.find(i=>i.id===id);
  if(!item || !fs.remaining.includes(id)) return;
  if(item.group === group){
    fs.remaining = fs.remaining.filter(x=>x!==id);
    fs.placed[group] = fs.placed[group] || [];
    fs.placed[group].push(id);
    fs.score++;
    fs.selected = null;
    render();
  } else {
    fs.wrongZone = group;
    render();
    setTimeout(()=>{ fs.wrongZone=null; render(); }, 600);
  }
}

/* --- Trivia --- */
function renderTrivia(){
  const tq = S.tq;
  if(tq.idx >= TRIVIA_QUESTIONS.length){
    return `<div class="center-msg"><div class="big-emoji">🏆</div>
      <p style="font-weight:700; font-size:1.1rem;">You got ${tq.correct}/${TRIVIA_QUESTIONS.length} correct!</p>
      <button class="btn btn-primary btn-sm" onclick="S.tq=null; openGame('tq')">Play Again</button></div>`;
  }
  const q = TRIVIA_QUESTIONS[tq.idx];
  const opts = q.options.map(opt=>{
    let cls='opt';
    if(tq.answered){
      if(opt===q.answer) cls+=' correct';
      else if(opt===tq.selected) cls+=' incorrect';
    }
    return `<button class="${cls}" ${tq.answered?'disabled':''} onclick="tqAnswer('${opt}')">${opt}</button>`;
  }).join('');
  return `
    <div style="display:flex; justify-content:space-between; font-size:.85rem; color:var(--muted); margin-bottom:.5rem;">
      <span>Nutrition Trivia Challenge</span><span>Question ${tq.idx+1}/${TRIVIA_QUESTIONS.length}</span>

    <div class="progress-track" style="margin-bottom:1rem;"><div class="progress-fill" style="width:${(tq.idx/TRIVIA_QUESTIONS.length)*100}%;"></div></div>
    <div class="quiz-box">

      ${tq.answered ? `<div class="feedback ${tq.selected===q.answer?'ok':'bad'}">

    </div>`;
}
function tqAnswer(opt){
  if(S.tq.answered) return;
  S.tq.selected = opt;
  S.tq.answered = true;
  if(opt === TRIVIA_QUESTIONS[S.tq.idx].answer) S.tq.correct++;

}

/* --- Speed Match --- */
function renderSpeedMatch(){
  const sm = S.sm;
  if(!sm.started && !sm.done){
    return `
      <p class="section-sub">Match foods with their health benefits as fast as you can!</p>
      <div class="center-msg">
        <div class="big-emoji">⚡</div>
        <p style="font-weight:700; font-size:1.1rem;">Ready to Play?</p>
        <p style="color:var(--muted); font-size:.88rem;">You have 60 seconds to match as many foods with their benefits as possible!</p>
        <div style="display:flex; gap:.8rem; justify-content:center; margin:1.2rem 0;">
          ${miniStat('5','Total Pairs')} ${miniStat('60s','Time Limit')} ${miniStat('⚡','Fast Paced')}
        </div>
        <button class="btn btn-primary" onclick="smStart()">⚡ Start Game</button>
      </div>`;
  }
  if(sm.done){
    const total = SPEED_PAIRS.length;
    const n = sm.matched.length;
    let affirmation;
    if(n === total) affirmation = "🌟 Nutrition superstar! You know your foods inside and out.";
    else if(n >= Math.ceil(total*0.6)) affirmation = "💪 Great work! Your healthy-food brain is getting stronger every game.";
    else if(n >= 1) affirmation = "🌱 Nice start! Every match makes you a smarter, healthier you.";
    else affirmation = "✨ Don't give up — champions keep trying. Give it another go!";
    return `<div class="center-msg"><div class="big-emoji">${n===total?'🏆':'⏰'}</div>
      <p style="font-weight:700; font-size:1.1rem;">${n===total ? 'You matched all pairs!' : "Time's up!"}</p>
      <p style="color:var(--muted);">You matched ${n}/${total} pairs.</p>
      <p style="font-weight:600; color:var(--g3); background:var(--green-soft); border-radius:12px; padding:.8rem 1rem; max-width:360px; margin:.4rem auto 1rem;">${affirmation}</p>
      <button class="btn btn-primary btn-sm" onclick="S.sm=null; openGame('sm')">Play Again</button></div>`;
  }
  const foodCol = sm.foodOrder.map(p=>{
    let cls='sm-card';
    if(sm.matched.includes(p.id)) cls+=' matched';
    else if(sm.selFood===p.id) cls+=' selected';
    if(sm.wrong && sm.selFood===p.id) cls+=' wrong';
    return `<div class="${cls}" onclick="smPickFood('${p.id}')">${p.food}</div>`;
  }).join('');
  const benCol = sm.benefitOrder.map(p=>{
    let cls='sm-card';
    if(sm.matched.includes(p.id)) cls+=' matched';
    else if(sm.selBenefit===p.id) cls+=' selected';
    if(sm.wrong && sm.selBenefit===p.id) cls+=' wrong';
    return `<div class="${cls}" onclick="smPickBenefit('${p.id}')">${p.benefit}</div>`;
  }).join('');
  return `
    <div style="display:flex; justify-content:space-between; margin-bottom:.6rem;">
      <span style="font-weight:700; color:var(--g3);">⏱ ${sm.timeLeft}s</span>
      <span style="font-weight:700;">Matched: ${sm.matched.length}/${SPEED_PAIRS.length}</span>
    </div>
    <div class="sm-cols"><div>${foodCol}</div><div>${benCol}</div></div>`;
}
function miniStat(val,label){ return `<div style="background:var(--soft); border-radius:10px; padding:.6rem 1rem; min-width:90px;"><div style="font-weight:700; color:var(--g3);">${val}</div><div style="font-size:.72rem; color:var(--muted);">${label}</div></div>`; }
function stopSpeedMatchTimer(){ if(smTimer){ clearInterval(smTimer); smTimer=null; } }
function smStart(){
  S.sm.started = true;
  S.sm.timeLeft = 60;
  stopSpeedMatchTimer();
  smTimer = setInterval(()=>{
    S.sm.timeLeft--;
    if(S.sm.timeLeft<=0){ S.sm.done=true; S.sm.started=false; stopSpeedMatchTimer(); }
    render();
  }, 1000);
  render();
}
function smPickFood(id){ if(S.sm.matched.includes(id)) return; S.sm.selFood=id; smCheck(); }
function smPickBenefit(id){ if(S.sm.matched.includes(id)) return; S.sm.selBenefit=id; smCheck(); }
function smCheck(){
  const sm = S.sm;
  if(sm.selFood && sm.selBenefit){
    if(sm.selFood === sm.selBenefit){
      sm.matched.push(sm.selFood);
      sm.selFood=null; sm.selBenefit=null; sm.wrong=false;
      if(sm.matched.length === SPEED_PAIRS.length){ sm.done=true; sm.started=false; stopSpeedMatchTimer(); }
      render();
    } else {
      sm.wrong=true;
      render();
      setTimeout(()=>{ sm.selFood=null; sm.selBenefit=null; sm.wrong=false; render(); }, 550);
    }
  } else render();
}

function lineChart(seriesA, seriesB, labels){
  const W=560,H=190,padL=34,padR=10,padT=10,padB=24;
  const innerW=W-padL-padR, innerH=H-padT-padB;
  const n=labels.length;
  const x=i=> padL + (innerW/(n-1))*i;
  const y=v=> padT + innerH - (v/100)*innerH;
  const pathOf = s => s.map((v,i)=> (i===0?'M':'L')+x(i)+','+y(v)).join(' ');
  const grid=[0,25,50,75,100].map(v=>`<line x1="${padL}" x2="${W-padR}" y1="${y(v)}" y2="${y(v)}" stroke="#eef2f1" stroke-width="1"/><text x="2" y="${y(v)+4}" font-size="9" fill="#94a3b8">${v}</text>`).join('');
  const labelsSvg = labels.map((l,i)=>`<text x="${x(i)}" y="${H-4}" font-size="9" fill="#94a3b8" text-anchor="middle">${l}</text>`).join('');
  const dotsA = seriesA.map((v,i)=>`<circle cx="${x(i)}" cy="${y(v)}" r="3" fill="#16a34a"/>`).join('');
  const dotsB = seriesB.map((v,i)=>`<circle cx="${x(i)}" cy="${y(v)}" r="3" fill="#3b82f6"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%; height:auto;">
    ${grid}${labelsSvg}
    <path d="${pathOf(seriesA)}" fill="none" stroke="#16a34a" stroke-width="2.5"/>
    <path d="${pathOf(seriesB)}" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
    ${dotsA}${dotsB}
  </svg>`;
}

    <div class="bar-group"><div class="bar-pair"><div class="bar score" style="height:${d.v}%; width:30px;"></div></div><div class="bar-day">${d.g}</div></div>`).join('')}</div>`;
}

/* boot */
render();
</script>
